<!doctype html>
<html lang="en">
  <head>

    <!-- Structured Data: LocalBusiness -->

      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "D&M Studio",
      "description": "Professional website design and development for small businesses. Starter websites from €250.",

      "areaServed": "Worldwide",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Website Packages",

          {
            "@type": "Offer",
            "name": "Starter Website",
            "price": "250",
            "priceCurrency": "EUR"

          {
            "@type": "Offer",

  <body>
